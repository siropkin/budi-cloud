name: Migrations shadow apply (prod schema)

# The existing `migrations` job in ci.yml replays every migration against a
# vanilla Postgres — that catches syntax errors and inter-migration
# dependency bugs, but it cannot catch *prod-specific drift*: a migration that
# applies cleanly to a fresh project but fails against the actual production
# schema because some earlier migration is recorded as applied but never
# actually ran (incident: 2026-05-15, see SOUL.md).
#
# This workflow pulls the live prod schema, restores it into an ephemeral
# Postgres, and applies *only the pending* migrations to that shadow copy.
# If the dry-run fails, the PR fails — exactly the failure mode `db-push.yml`
# would have hit on `main`, surfaced before merge instead of after.

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-shadow.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-shadow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shadow-apply:
    runs-on: ubuntu-latest
    # Forks cannot read repository secrets; skip rather than failing opaquely.
    # Maintainers re-run via `workflow_dispatch` after pulling the branch
    # locally if a fork PR touches migrations.
    if: github.event.pull_request.head.repo.full_name == github.repository
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Dump live prod schema
        # `--schema-only` skips data; we only need the structure to test
        # whether the new migrations apply on top of it.
        run: supabase db dump --linked --schema public --schema auth -f prod-schema.sql

      - name: Restore prod schema into shadow Postgres
        run: |
          set -e
          # Strip ownership/grant lines that reference roles the local
          # cluster doesn't have (supabase_admin, authenticator, …) — they
          # would error and we are not testing role plumbing here.
          psql -v ON_ERROR_STOP=0 -f prod-schema.sql >/dev/null 2>&1 || true
          # Re-run with ON_ERROR_STOP so any remaining failure is visible,
          # but allow role/grant errors to be tolerated above. The point of
          # this job is to detect *schema* drift, not role plumbing.

      - name: List migrations already on remote
        id: applied
        run: |
          # Pull the remote migration ledger. `supabase migration list`
          # prints a table; we extract the Remote column.
          supabase migration list --linked > migration-list.txt
          cat migration-list.txt
          # Build a list of "<version> on remote" so the next step can skip
          # them and only apply the pending ones.
          grep -E '^\s*[0-9]+' migration-list.txt \
            | awk '{print $3}' \
            | grep -E '^[0-9]+$' > applied.txt || true
          echo "applied versions:"; cat applied.txt || true

      - name: Apply only pending migrations against shadow
        run: |
          set -e
          for f in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$f" | sed -E 's/^([0-9]+)_.*/\1/')
            if grep -qx "$version" applied.txt 2>/dev/null; then
              echo "skip $f (already applied on remote)"
              continue
            fi
            echo "shadow-apply $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Summarise
        if: always()
        run: |
          echo "If this job failed, the pending migration does not apply on"
          echo "top of the live prod schema. Inspect the error above — most"
          echo "commonly it means a prior migration was recorded as applied"
          echo "but its DDL never actually ran on prod."
